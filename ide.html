<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE</title>
    <style>
        body {
            transition: background-color 0.5s;
        }
        .dark-mode {
            background-color: #333;
            color: white;
        }
        .light-mode {
            background-color: white;
            color: black;
        }
        /* Theme colors */
        .theme-red { background-color: red; }
        .theme-blue { background-color: blue; }
        .theme-green { background-color: green; }
    </style>
</head>
<body class="light-mode">
    <button id="theme-toggle">Toggle Dark/Light Mode</button>
    <div>
        <h1>Settings</h1>
        <label for="password">Change Password:</label>
        <input type="password" id="password" placeholder="New Password">
        <button id="change-password">Change Password</button>
    </div>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        let currentTheme = 'light';

        themeToggle.addEventListener('click', () => {
            if (currentTheme === 'light') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                currentTheme = 'dark';
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                currentTheme = 'light';
            }
            // Save theme mode to Firebase
        });

        document.getElementById('change-password').addEventListener('click', () => {
            const newPassword = document.getElementById('password').value;
            // Update password globally in Firebase
            // If fallback needed, use master password: MOON143
        });
    </script>
</body>
</html>
