<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyCloud IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f14; --surface:#13161e; --border:#1f2433;
      --accent:#00e5ff; --accent2:#7c3aed; --green:#00ff9d;
      --red:#ff4f6a; --text:#e2e8f0; --muted:#4a5568; --panel:#0f1219;
      --sidebar-bg: #1a1d26;
      --console-bg: var(--panel);
    }
    body.light-mode {
      --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
      --accent:#0ea5e9; --accent2:#8b5cf6; --green:#10b981;
      --red:#ef4444; --text:#1e293b; --muted:#64748b; --panel:#f1f5f9;
      --sidebar-bg: #e2e8f0;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:'Syne',sans-serif; background:var(--bg);
      color:var(--text); height:100vh; display:flex;
      flex-direction:column; overflow:hidden;
      transition: background 0.3s, color 0.3s;
    }
    header{
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; height:52px; background:var(--surface);
      border-bottom:1px solid var(--border); flex-shrink:0; gap:12px;
      z-index: 100;
    }
    .logo{ font-size:18px; font-weight:800; letter-spacing:-0.5px; color:var(--accent); white-space:nowrap; display: flex; align-items: center; gap: 8px; }
    .logo img { height: 24px; width: auto; }
    .logo span{ color:var(--accent2); }
    #projectName{
      background:var(--panel); border:1px solid var(--border);
      color:var(--text); font-family:'Space Mono',monospace;
      font-size:12px; padding:5px 10px; border-radius:6px;
      width:160px; outline:none; transition:border-color 0.2s;
    }
    #projectName:focus{ border-color:var(--accent); }
    .header-btns{ display:flex; gap:8px; flex-shrink:0; align-items: center; }
    button{
      font-family:'Space Mono',monospace; font-size:11px; font-weight:700;
      padding:6px 14px; border:none; border-radius:6px; cursor:pointer;
      transition:all 0.15s; letter-spacing:0.5px; white-space:nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    button.clicked { border: 2px solid var(--red) !important; }
    #runBtn{ background:var(--green); color:#000; }
    #runBtn:hover{ filter:brightness(1.15); transform:translateY(-1px); }
    #runBtn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }
    #saveBtn{ background:var(--accent); color:#000; }
    #saveBtn img { height: 14px; width: auto; }
    #saveBtn:hover{ filter:brightness(1.1); transform:translateY(-1px); }
    #loadBtn{ background:var(--accent2); color:#fff; }
    #loadBtn:hover{ filter:brightness(1.2); transform:translateY(-1px); }
    #shareBtn{ background:var(--border); color:var(--text); }
    #shareBtn:hover{ background:#2a3045; transform:translateY(-1px); }
    #settingsBtn { background: var(--border); color: var(--text); }
    #logoutBtn{ background:transparent; color:var(--muted); border:1px solid var(--border); }
    #logoutBtn:hover{ color:var(--red); border-color:var(--red); }
    #themeToggle { background: var(--border); color: var(--text); font-size: 14px; padding: 6px 10px; }

    main{ flex:1; display:flex; overflow:hidden; position: relative; }
    .editor-panel{ flex:1; display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--border); z-index: 10; }
    .panel-label{
      font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted);
      padding:8px 16px; background:var(--surface);
      border-bottom:1px solid var(--border); text-transform:uppercase;
    }
    #editor{ flex:1; overflow:hidden; }
    .output-panel{ width:30%; min-width:260px; display:flex; flex-direction:column; background:var(--console-bg); border-right: 1px solid var(--border); z-index: 10; position: relative; }
    .output-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border);
    }
    #clearBtn{ background:transparent; color:var(--muted); font-size:10px; padding:3px 8px; border:1px solid var(--border); }
    #clearBtn:hover{ color:var(--text); border-color:var(--muted); }
    #output{
      flex:1; font-family:'Space Mono',monospace; font-size:12.5px;
      line-height:1.7; padding:16px; overflow-y:auto;
      white-space:pre-wrap; word-break:break-all; color:var(--green);
      background: transparent;
    }
    #output .error{ color:var(--red); }
    #output .info{ color:var(--accent); }

    /* ── BOSS SIDEBAR ── */
    .boss-sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      transition: background 0.3s;
      z-index: 10;
    }
    .boss-header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .boss-avatar {
      width: 32px; height: 32px; background: var(--accent2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .boss-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .boss-name { font-weight: 800; font-size: 14px; color: var(--accent); }
    .boss-chat {
      flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
      font-family: 'Space Mono', monospace; font-size: 12px;
    }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; position: relative; }
    .msg.boss { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
    .msg.user { background: var(--accent2); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .typing-indicator { font-size: 10px; color: var(--muted); padding: 0 16px 8px; font-style: italic; }

    #statusBar{
      height:24px; background:var(--accent2); display:flex; align-items:center;
      padding:0 16px; font-family:'Space Mono',monospace;
      font-size:10px; color:#fff; flex-shrink:0; gap:16px;
      z-index: 100;
    }
    #statusText{ flex:1; }

    /* ── LOADER OVERLAY ── */
    #loaderOverlay {
      position: fixed; inset: 0; background: rgba(13, 15, 20, 0.95);
      z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .loader-card {
      width: 320px; text-align: center;
    }
    .loader-title { font-weight: 800; font-size: 18px; color: var(--accent); margin-bottom: 8px; }
    .loader-status { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
    .progress-container {
      width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 12px;
    }
    #progressBar { width: 0%; height: 100%; background: var(--accent2); transition: width 0.3s ease; }
    .loader-eta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent2); }

    /* ── TOAST ── */
    #toast{
      position:fixed; bottom:36px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface); border:1px solid var(--accent);
      color:var(--accent); font-family:'Space Mono',monospace;
      font-size:12px; padding:10px 20px; border-radius:8px;
      opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap;
    }
    #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── MODALS ── */
    .modal-bg{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.7); z-index:1000;
      align-items:center; justify-content:center;
    }
    .modal-bg.open{ display:flex; }
    .modal{
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:24px; width:420px; max-width:90vw;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3{ font-size:16px; margin-bottom:16px; color:var(--accent); }
    .modal-close{ margin-top:16px; background:var(--border); color:var(--text); width:100%; padding:8px; }

    .input-group { margin-bottom: 16px; }
    .input-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; display:block; }
    .modal-input {
      width:100%; background:rgba(255,255,255,0.04);
      border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-family:'Space Mono',monospace;
      font-size:13px; padding:10px 14px; outline:none;
    }
    .save-settings-btn { background:var(--green); color:#000; width:100%; padding:10px; margin-top:10px; }

    /* ── CONSOLE BACKGROUND ── */
    #consoleBg {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      opacity: 0.2; pointer-events: none; z-index: 0;
    }

    ::-webkit-scrollbar{ width:6px; height:6px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }

    @media(max-width:1024px){ .boss-sidebar { display: none; } }
    @media(max-width:640px){
      .output-panel{ width:100%; min-width:unset; }
      main{ flex-direction:column; }
      .editor-panel{ border-right:none; border-bottom:1px solid var(--border); height:55%; }
      .output-panel{ height:45%; }
      #projectName{ width:100px; }
    }
  </style>
</head>
<body>

<div id="loaderOverlay">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOKp_ksThO3E_oc_H7NWMqkPTuLoDrrKI",
    authDomain: "ideqvr.firebaseapp.com",
    projectId: "ideqvr",
    storageBucket: "ideqvr.firebasestorage.app",
    messagingSenderId: "258032258981",
    appId: "1:258032258981:web:d302dcc896d5ab18c2e24c",
    measurementId: "G-JDEF11SPS6"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const storage = getStorage(app);
  window._db = db;
  window._firestoreFns = { doc, setDoc, getDocs, deleteDoc, collection };

  // ── LIVE ASSET SYNC ──
  onSnapshot(doc(db, "settings", "global"), (docSnap) => {
    if (docSnap.exists()) {
      const data = docSnap.data();
      window._globalSettings = data;

      if (data.siteName) document.getElementById('siteName').innerHTML = data.siteName;

      const logoContainer = document.getElementById('siteLogoContainer');
      if (data.assets?.logoUrl) {
        let img = logoContainer.querySelector('img');
        if (!img) { img = document.createElement('img'); logoContainer.prepend(img); }
        img.src = data.assets.logoUrl;
      }

      if (data.assets?.backgroundUrl) {
        document.body.style.backgroundImage = `url('${data.assets.backgroundUrl}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      }

      if (data.assets?.aiSymbolUrl) {
        document.getElementById('bossAvatar').innerHTML = `<img src="${data.assets.aiSymbolUrl}">`;
      }

      if (data.assets?.saveIconUrl) {
        document.getElementById('saveBtnIcon').innerHTML = `<img src="${data.assets.saveIconUrl}">`;
      }

      if (data.assets?.consoleBgUrl) {
        const bg = document.getElementById('consoleBg');
        if (data.assets.consoleBgUrl === 'transparent') {
          bg.style.backgroundImage = 'none';
          document.documentElement.style.setProperty('--console-bg', 'transparent');
        } else {
          bg.style.backgroundImage = `url('${data.assets.consoleBgUrl}')`;
          document.documentElement.style.setProperty('--console-bg', 'rgba(15, 18, 25, 0.7)');
        }
      }

      // Fill modal inputs
      document.getElementById('setSiteName').value      = data.siteName || '';
      document.getElementById('setLogoUrl').value       = data.assets?.logoUrl || '';
      document.getElementById('setBgUrl').value         = data.assets?.backgroundUrl || '';
      document.getElementById('setAiSymbolUrl').value   = data.assets?.aiSymbolUrl || '';
      document.getElementById('setSaveIconUrl').value   = data.assets?.saveIconUrl || '';
      document.getElementById('setConsoleBgUrl').value  = data.assets?.consoleBgUrl || '';
    }
  });

  // ── FIREBASE STORAGE UPLOAD ──
  // Uploads a File object to Storage under assets/<key>_<timestamp>.<ext>
  // Saves the download URL to Firestore settings/global/assets/<key>
  // Calls onProgress(0-100) during upload, resolves with the URL.
  window._uploadAsset = function(file, assetKey, onProgress) {
    return new Promise((resolve, reject) => {
      const ext      = file.name.split('.').pop();
      const path     = `assets/${assetKey}_${Date.now()}.${ext}`;
      const storeRef = ref(storage, path);
      const task     = uploadBytesResumable(storeRef, file);

      task.on('state_changed',
        (snap) => {
          const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
          onProgress?.(pct);
        },
        (err) => reject(err),
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            // Merge URL into Firestore — triggers onSnapshot on every device
            await setDoc(doc(db, 'settings', 'global'),
              { assets: { [assetKey]: url } },
              { merge: true }
            );
            resolve(url);
          } catch(e) { reject(e); }
        }
      );
    });
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>
let editor, pyodide, pyodideReady = false, isDownloading = false;
const output  = document.getElementById('output');
const runBtn  = document.getElementById('runBtn');
const statusT = document.getElementById('statusText');
const bossChat = document.getElementById('bossChat');
const typingIndicator = document.getElementById('typingIndicator');

const STARTER = `# Welcome to PyCloud IDE 🚀\n# Write Python and hit ▶ Run\n\ndef greet(name):\n    return f"Hello, {name}! Ready to build something epic?"\n\nprint(greet("Boss"))\n`;

// ── THEME ──
const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = () => {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  localStorage.setItem('pycloud_theme', isLight ? 'light' : 'dark');
  if (editor) monaco.editor.setTheme(isLight ? 'vs' : 'pycloud');
};
if (localStorage.getItem('pycloud_theme') === 'light') document.body.classList.add('light-mode');

// ── MONACO ──
require.config({ paths:{ vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
require(['vs/editor/editor.main'], function(){
  monaco.editor.defineTheme('pycloud',{
    base:'vs-dark', inherit:true,
    rules:[
      {token:'keyword',foreground:'7c3aed',fontStyle:'bold'},
      {token:'string',foreground:'00ff9d'},
      {token:'comment',foreground:'4a5568',fontStyle:'italic'},
      {token:'number',foreground:'00e5ff'},
    ],
    colors:{
      'editor.background':'#0d0f14','editor.foreground':'#e2e8f0',
      'editorLineNumber.foreground':'#2a3045',
      'editorLineNumber.activeForeground':'#7c3aed',
      'editor.selectionBackground':'#7c3aed44',
      'editor.lineHighlightBackground':'#13161e',
      'editorCursor.foreground':'#00e5ff',
    }
  });
  const currentTheme = document.body.classList.contains('light-mode') ? 'vs' : 'pycloud';
  editor = monaco.editor.create(document.getElementById('editor'),{
    value:STARTER, language:'python', theme: currentTheme,
    fontSize:14, fontFamily:"'Space Mono',monospace",
    lineNumbers:'on', minimap:{enabled:false},
    scrollBeyondLastLine:false, automaticLayout:true,
    tabSize:4, insertSpaces:true, wordWrap:'on',
    cursorBlinking:'smooth', smoothScrolling:true,
    autoClosingBrackets:'always', autoIndent:'full',
    bracketPairColorization:{enabled:true},
  });
  editor.onDidChangeModelContent(() => showTyping());
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, ()=>handleRunClick());
  checkShareLink();
});

// ── BOSS LOGIC ──
const bossMsgs = ["Nice code, Boss.", "Are we hacking NASA today?", "Your logic is impeccable.", "I'm tracking every keystroke.", "Should I order some coffee?"];
function addBossMsg(text, isUser = false) {
  const msg = document.createElement('div');
  msg.className = `msg ${isUser ? 'user' : 'boss'}`;
  msg.textContent = text;
  bossChat.appendChild(msg);
  bossChat.scrollTop = bossChat.scrollHeight;
}

  typingTimeout = setTimeout(() => {
    typingIndicator.style.display = 'none';

// ── PYODIDE LOADER WITH REAL PROGRESS ──
// Intercepts the actual WASM fetch using a ReadableStream proxy.
// Progress % and ETA are calculated from real bytes transferred.
async function loadPyodideWithProgress() {
  if (isDownloading) return;
  isDownloading = true;

  const overlay = document.getElementById('loaderOverlay');
  const bar     = document.getElementById('progressBar');
  const status  = document.getElementById('loaderStatus');
  const eta     = document.getElementById('loaderEta');

  overlay.style.display = 'flex';
  bar.style.width  = '0%';
  bar.style.background = 'var(--accent2)';
  status.textContent   = 'Loading Python engine...';
  eta.textContent      = 'ESTIMATED TIME: calculating...';

  // Pyodide v0.25.1 wasm is ~28 MB — used as fallback if content-length is absent
  const KNOWN_WASM_BYTES = 28_500_000;
  const PYODIDE_CDN      = 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/';

  // Smooth bar animation helper used during the finalization gap (90% → 99%)
  let animFrame;
  function animateTo(target, durationMs) {
    cancelAnimationFrame(animFrame);
    const start     = parseFloat(bar.style.width) || 0;
    const startTime = performance.now();
    function step(now) {
      const t   = Math.min((now - startTime) / durationMs, 1);
      const pct = start + (target - start) * t;
      bar.style.width = pct + '%';
      if (t < 1) animFrame = requestAnimationFrame(step);
    }
    animFrame = requestAnimationFrame(step);
  }

  // Monkey-patch window.fetch to intercept the WASM binary and track real bytes.
  // Every other request passes through untouched.
  const originalFetch = window.fetch;
  let   wasmDone      = false;

  window.fetch = async function(input, init) {
    const url      = (typeof input === 'string') ? input : (input?.url ?? '');
    const response = await originalFetch(input, init);

    if (!wasmDone && url.includes('pyodide.asm.wasm')) {
      wasmDone = true;
      status.textContent = 'Downloading Python runtime...';

      const contentLength = parseInt(response.headers.get('content-length') || '0', 10);
      const total         = contentLength > 0 ? contentLength : KNOWN_WASM_BYTES;
      let   received      = 0;
      const t0            = Date.now();

      const reader = response.body.getReader();
      const stream = new ReadableStream({
        start(controller) {
          function pump() {
            return reader.read().then(({ done, value }) => {
              if (done) {
                controller.close();
                // Wasm fully downloaded → animate to 99% while Python initialises
                status.textContent = 'Installing packages...';
                animateTo(99, 5000);
                eta.textContent = 'ESTIMATED TIME: a few seconds...';
                return;
              }
              received += value.length;
              const pct     = Math.min(90, (received / total) * 100);
              const elapsed = (Date.now() - t0) / 1000;
              const speed   = received / Math.max(elapsed, 0.1);   // bytes/s
              const etaSec  = Math.ceil((total - received) / speed);

              bar.style.width = pct + '%';
              eta.textContent = `ESTIMATED TIME: ${etaSec > 0 ? etaSec + 's' : 'almost done...'}`;

              controller.enqueue(value);
              return pump();
            }).catch(err => controller.error(err));
          }
          return pump();
        }
      });

      // Return a cloned Response whose body is our tracking stream
      return new Response(stream, {
        headers:    response.headers,
        status:     response.status,
        statusText: response.statusText,
      });
    }

    return response;
  };

  try {
    // Step 1 — inject pyodide.js (small script, ~350 KB)
    bar.style.width = '5%';
    await new Promise((resolve, reject) => {
      const s   = document.createElement('script');
      s.src     = PYODIDE_CDN + 'pyodide.js';
      s.onload  = resolve;
      s.onerror = () => reject(new Error('Failed to load pyodide.js'));
      document.head.appendChild(s);
    });

    bar.style.width = '8%';

    // Step 2 — loadPyodide() triggers internal fetches; wasm is intercepted above
    pyodide = await loadPyodide({ indexURL: PYODIDE_CDN });

    // Restore fetch
    window.fetch = originalFetch;
    cancelAnimationFrame(animFrame);

    // Done
    bar.style.width      = '100%';
    bar.style.background = 'var(--green)';
    status.textContent   = '✅ Python ready!';
    eta.textContent      = '';

    pyodideReady  = true;
    isDownloading = false;

    // Persist ready flag to Firestore
    if (window._db && window._firestoreFns) {
      const { doc, setDoc } = window._firestoreFns;
      setDoc(doc(window._db, 'settings', 'global'), { pyodideReady: true }, { merge: true });
    }

    setTimeout(() => { overlay.style.display = 'none'; }, 700);
    runCode();

  } catch(e) {
    window.fetch    = originalFetch;
    isDownloading   = false;
    status.textContent    = '❌ Load failed: ' + e.message;
    eta.textContent       = 'Check your internet connection and reload.';
    bar.style.background  = 'var(--red)';
    setTimeout(() => { overlay.style.display = 'none'; }, 4000);
  }
}

// ── RUN LOGIC ──
function handleRunClick() {
  if (!pyodideReady) {
    if (confirm("Python runtime not installed. Download required. Continue?")) {
      loadPyodideWithProgress();
    }
  } else {
    runCode();
  }
}

async function runCode(){
  const code=editor.getValue();
  if(!code.trim()) return;
  runBtn.disabled=true; runBtn.textContent='⏳ Running…';
  statusT.textContent='🔄 Executing…'; output.innerHTML='';
  
  try {
    await pyodide.runPythonAsync(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
    `);
    
    await pyodide.runPythonAsync(code);
    
    const stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");
    const stderr = await pyodide.runPythonAsync("sys.stderr.getvalue()");
    
    if (stdout) appendOutput(stdout, 'normal');
    if (stderr) appendOutput(stderr, 'error');
    if (!stdout && !stderr) appendOutput('(no output)\n', 'info');
    
    statusT.textContent='✅ Done';
    addBossMsg("Execution successful, Boss.");
  } catch(err){
    appendOutput(err.message + '\n', 'error');
    statusT.textContent='❌ Error';
    addBossMsg("Oops, a little hiccup there, Boss.");
  } finally {
    runBtn.disabled=false; runBtn.textContent='▶ Run';
  }
}

function appendOutput(text,type='normal'){
  const span=document.createElement('span');
  if(type!=='normal') span.className=type;
  span.textContent=text;
  output.appendChild(span);
  output.scrollTop=output.scrollHeight;
}

// ── SETTINGS ──
function openSettingsModal() { document.getElementById('settingsModal').classList.add('open'); }
async function saveGlobalSettings() {
  const db = window._db;
  const {doc, setDoc} = window._firestoreFns;
  const data = {
    siteName: document.getElementById('setSiteName').value,
    assets: {
      logoUrl: document.getElementById('setLogoUrl').value,
      backgroundUrl: document.getElementById('setBgUrl').value,
      aiSymbolUrl: document.getElementById('setAiSymbolUrl').value,
      saveIconUrl: document.getElementById('setSaveIconUrl').value,
      consoleBgUrl: document.getElementById('setConsoleBgUrl').value
    }
  };

    await setDoc(doc(db, "settings", "global"), data, {merge: true});
    showToast("🛡️ Settings updated globally!");
    closeModal('settingsModal');
  } catch(e) { showToast("❌ Update failed"); }
}

// ── SAVE/LOAD/SHARE ──
async function saveProject(){
  const db=window._db; if(!db) return;
  const name=document.getElementById('projectName').value.trim()||'untitled';
  const code=editor.getValue();
  const {doc,setDoc}=window._firestoreFns;
  try {
    await setDoc(doc(db,'projects',name),{name,code,updatedAt:new Date().toISOString()});
    showToast(`🛡️ Saved: ${name}`);
  } catch(e){ showToast('❌ Save failed'); }
}
async function openLoadModal(){
  const db=window._db; if(!db) return;
  const {getDocs,collection,doc,deleteDoc}=window._firestoreFns;
  const list=document.getElementById('projectList');
  list.innerHTML='<li>Loading…</li>';
  document.getElementById('loadModal').classList.add('open');
  try {
    const snap=await getDocs(collection(db,'projects'));
    list.innerHTML='';
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      const li=document.createElement('li');
      li.style.cssText = "display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid var(--border); cursor:pointer;";
      li.innerHTML=`<span>${d.name}</span><button style="padding:2px 6px; background:var(--red); color:#fff;">del</button>`;
      li.onclick=()=>{ editor.setValue(d.code); document.getElementById('projectName').value=d.name; closeModal('loadModal'); };
      li.querySelector('button').onclick=(e)=>{ e.stopPropagation(); deleteDoc(doc(db,'projects',d.name)); li.remove(); };
      list.appendChild(li);
    });
  } catch(e){ list.innerHTML='<li>Failed to load</li>'; }
}
function shareProject(){
  const code=editor.getValue();
  const encoded=btoa(unescape(encodeURIComponent(code)));
  const url=`${location.origin}${location.pathname}?code=${encoded}`;
  navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link copied!'));
}
function checkShareLink(){
  const params=new URLSearchParams(location.search);
  if(params.has('code')){
    try {
      const code=decodeURIComponent(escape(atob(params.get('code'))));
      if(editor) editor.setValue(code);
      else setTimeout(()=>editor&&editor.setValue(code),1000);
      history.replaceState({},'',location.pathname);
    } catch(e){}
  }
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function logout(){ window.location.href='index.html'; }
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── LOCAL FILE → FIREBASE STORAGE UPLOAD ──
// Opens native file picker, uploads to Firebase Storage,
// saves download URL to Firestore (triggers onSnapshot on ALL devices).
function pickAndUpload(assetKey, inputId) {
  if (!window._uploadAsset) { showToast('❌ Storage not ready'); return; }
  const input  = document.createElement('input');
  input.type   = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const progressWrap = document.getElementById('uploadProgress');
    const uploadBar    = document.getElementById('uploadBar');
    const uploadStatus = document.getElementById('uploadStatus');
    progressWrap.style.display = 'block';
    uploadBar.style.width      = '0%';
    uploadStatus.textContent   = `Uploading ${file.name}...`;

    try {
      const url = await window._uploadAsset(file, assetKey, (pct) => {
        uploadBar.style.width    = pct + '%';
        uploadStatus.textContent = `Uploading... ${pct}%`;
      });
      document.getElementById(inputId).value = url;
      uploadStatus.textContent = '✅ Done! All devices updating...';
      uploadBar.style.background = 'var(--green)';
      setTimeout(() => {
        progressWrap.style.display = 'none';
        uploadBar.style.background = 'var(--accent)';
        uploadBar.style.width      = '0%';
      }, 2000);
      showToast('✅ Uploaded & synced globally!');
    } catch(err) {
      uploadStatus.textContent = '❌ Upload failed: ' + err.message;
      uploadBar.style.background = 'var(--red)';
      setTimeout(() => { progressWrap.style.display = 'none'; }, 3000);
      showToast('❌ Upload failed');
    }
  };
  input.click();
}

document.getElementById('runBtn').onclick=handleRunClick;
document.getElementById('saveBtn').onclick=saveProject;
document.getElementById('loadBtn').onclick=openLoadModal;
document.getElementById('shareBtn').onclick=shareProject;
document.getElementById('clearBtn').onclick=()=>{ output.innerHTML=''; };
