<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyCloud IDE — ULTIMATE BEAST MODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── CORE THEME ── */
    :root {
      --bg:#0d0f14; --surface:#13161e; --border:#1f2433;
      --accent:#00e5ff; --accent2:#7c3aed; --green:#00ff9d;
      --red:#ff4f6a; --text:#e2e8f0; --muted:#4a5568; --panel:#0f1219;
      --sidebar-bg: #1a1d26;
      --console-bg: var(--panel);
      --glow: rgba(0, 229, 255, 0.3);
    }
    body.light-mode {
      --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
      --accent:#0ea5e9; --accent2:#8b5cf6; --green:#10b981;
      --red:#ef4444; --text:#1e293b; --muted:#64748b; --panel:#f1f5f9;
      --sidebar-bg: #e2e8f0;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:'Syne',sans-serif; background:var(--bg);
      color:var(--text); height:100vh; display:flex;
      flex-direction:column; overflow:hidden;
      transition: background 0.3s, color 0.3s;
    }
    
    /* ── DIAMOND LAYOUT ── */
    header {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 20px; height: 64px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 100;
    }
    .header-left { display: flex; gap: 8px; align-items: center; }
    .header-right { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
    
    .diamond-logo-container {
      width: 60px; height: 60px; background: var(--accent2);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      display: flex; align-items: center; justify-content: center;
      transform: translateY(10px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
      cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .diamond-logo-container:hover { transform: translateY(12px) scale(1.1); }
    .diamond-logo-container img { max-width: 60%; max-height: 60%; object-fit: contain; }

    #projectName{
      background:var(--panel); border:1px solid var(--border);
      color:var(--text); font-family:'Space Mono',monospace;
      font-size:12px; padding:5px 10px; border-radius:6px;
      width:140px; outline:none; transition:border-color 0.2s;
    }
    #projectName:focus{ border-color:var(--accent); }
    
    button{
      font-family:'Space Mono',monospace; font-size:10px; font-weight:700;
      padding:6px 12px; border:none; border-radius:6px; cursor:pointer;
      transition:all 0.15s; letter-spacing:0.5px; white-space:nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    button.clicked { border: 2px solid var(--red) !important; }
    #runBtn{ background:var(--green); color:#000; font-size: 12px; padding: 8px 20px; box-shadow: 0 0 15px rgba(0, 255, 157, 0.2); }
    #runBtn:hover{ filter:brightness(1.15); transform:translateY(-1px); box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); }
    #runBtn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }
    #saveBtn{ background:var(--accent); color:#000; }
    #saveBtn img { height: 14px; width: auto; }
    #saveBtn:hover{ filter:brightness(1.1); transform:translateY(-1px); }
    #loadBtn{ background:var(--accent2); color:#fff; }
    #loadBtn:hover{ filter:brightness(1.2); transform:translateY(-1px); }
    #shareBtn{ background:var(--border); color:var(--text); }
    #shareBtn:hover{ background:#2a3045; transform:translateY(-1px); }
    #settingsBtn, #profileBtn, #assetsBtn { background: var(--border); color: var(--text); }
    #logoutBtn{ background:transparent; color:var(--muted); border:1px solid var(--border); }
    #logoutBtn:hover{ color:var(--red); border-color:var(--red); }
    #themeToggle { background: var(--border); color: var(--text); font-size: 14px; padding: 6px 10px; }

    main{ flex:1; display:flex; overflow:hidden; position: relative; }
    
    /* ── SPLIT SCREEN ── */
    .editor-panel{ flex:1; display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--border); z-index: 10; }
    .output-panel{ flex:1; display:flex; flex-direction:column; background:var(--console-bg); z-index: 10; position: relative; }
    
    .panel-label{
      font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted);
      padding:8px 16px; background:var(--surface);
      border-bottom:1px solid var(--border); text-transform:uppercase;
    }
    #editor{ flex:1; overflow:hidden; }
    
    .output-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border);
    }
    #clearBtn{ background:transparent; color:var(--muted); font-size:10px; padding:3px 8px; border:1px solid var(--border); }
    #clearBtn:hover{ color:var(--text); border-color:var(--muted); }
    
    /* ── INTERACTIVE CONSOLE ── */
    #output-container { flex:1; display:flex; flex-direction:column; overflow:hidden; background: transparent; }
    #output{
      flex:1; font-family:'Space Mono',monospace; font-size:12.5px;
      line-height:1.7; padding:16px; overflow-y:auto;
      white-space:pre-wrap; word-break:break-all; color:var(--green);
    }
    #console-input-line {
      display: flex; align-items: center; padding: 8px 16px;
      background: rgba(0,0,0,0.2); border-top: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 12.5px; color: var(--accent);
    }
    #console-prompt { margin-right: 8px; font-weight: bold; }
    #console-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: inherit;
    }
    #output .error{ color:var(--red); }
    #output .info{ color:var(--accent); }

    /* ── BOSS AI SIDEBAR ── */
    .boss-sidebar {
      width: 300px; background: var(--sidebar-bg);
      display: flex; flex-direction: column; border-left: 1px solid var(--border);
      transition: background 0.3s; z-index: 10;
    }
    .boss-header {
      padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .boss-avatar {
      width: 32px; height: 32px; background: var(--accent2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .boss-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .boss-name { font-weight: 800; font-size: 14px; color: var(--accent); }
    .boss-chat {
      flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
      font-family: 'Space Mono', monospace; font-size: 12px;
    }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; position: relative; }
    .msg.boss { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
    .msg.user { background: var(--accent2); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .typing-indicator { font-size: 10px; color: var(--muted); padding: 0 16px 8px; font-style: italic; }

    #statusBar{
      height:24px; background:var(--accent2); display:flex; align-items:center;
      padding:0 16px; font-family:'Space Mono',monospace;
      font-size:10px; color:#fff; flex-shrink:0; gap:16px;
      z-index: 100;
    }
    #statusText{ flex:1; }

    /* ── LOADER OVERLAY ── */
    #loaderOverlay {
      position: fixed; inset: 0; background: rgba(13, 15, 20, 0.95);
      z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .loader-card { width: 320px; text-align: center; }
    .loader-title { font-weight: 800; font-size: 18px; color: var(--accent); margin-bottom: 8px; }
    .loader-status { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
    .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
    #progressBar { width: 0%; height: 100%; background: var(--accent2); transition: width 0.3s ease; }
    .loader-eta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent2); }

    /* ── PROFILE / RANKS / ACHIEVEMENTS ── */
    .rank-badge-big { display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 0 6px; }
    .rank-icon-big { font-size:36px; }
    .rank-name-big { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
    .rank-bar-wrap { margin:10px 0 4px; }
    .rank-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:6px 0 4px; }
    .rank-bar-fill { height:100%; border-radius:3px; transition:width 0.9s cubic-bezier(0.22,1,0.36,1); }
    .rank-bar-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); text-align:center; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
    .stat-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
    .stat-value { font-family:'Space Mono',monospace; font-size:17px; font-weight:700; color:var(--accent); }
    .stat-label { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }
    .ach-list { max-height:220px; overflow-y:auto; padding-right:4px; }
    .ach-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .ach-icon { font-size:18px; width:26px; text-align:center; flex-shrink:0; margin-top:1px; }
    .ach-meta { flex:1; min-width:0; }
    .ach-name { font-size:11px; font-weight:700; }
    .ach-desc { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:1px; }
    .ach-bar { height:3px; background:var(--border); border-radius:2px; margin-top:5px; overflow:hidden; }
    .ach-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
    .ach-unlocked .ach-fill { background:var(--green); }
    .ach-locked   .ach-fill { background:var(--accent2); }
    .ach-pct { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); margin-top:2px; }

    /* ── TOAST ── */
    #toast{
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--surface); border:1px solid var(--accent); color:var(--accent);
      font-family:'Space Mono',monospace; font-size:12px; padding:10px 20px; border-radius:8px;
      opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap;
    }
    #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── MODALS ── */
    .modal-bg{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    .modal-bg.open{ display:flex; }
    .modal{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:480px; max-width:90vw; max-height: 90vh; overflow-y: auto; }
    .modal h3{ font-size:16px; margin-bottom:16px; color:var(--accent); }
    .modal-close{ margin-top:16px; background:var(--border); color:var(--text); width:100%; padding:8px; }

    .input-group { margin-bottom: 16px; }
    .input-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; display:block; }
    .modal-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px; padding:10px 14px; outline:none; }
    .save-settings-btn { background:var(--green); color:#000; width:100%; padding:10px; margin-top:10px; }

    #consoleBg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.2; pointer-events: none; z-index: 0; }
    ::-webkit-scrollbar{ width:6px; height:6px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }

    /* ── COMMAND PALETTE ── */
    #commandPalette {
      position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
      width: 500px; background: var(--surface); border: 1px solid var(--accent);
      border-radius: 12px; z-index: 3000; display: none; flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    #commandInput {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
      padding: 16px; color: var(--text); font-family: 'Space Mono', monospace; outline: none;
    }
    .command-item {
      padding: 12px 16px; cursor: pointer; font-size: 12px; font-family: 'Space Mono', monospace;
      display: flex; justify-content: space-between;
    }
    .command-item:hover, .command-item.selected { background: var(--accent2); color: #fff; }
    .command-shortcut { color: var(--muted); font-size: 10px; }
  </style>
</head>
<body>

<div id="loaderOverlay">
  <div class="loader-card">
    <div class="loader-title">INITIALIZING ENGINE</div>
    <div class="loader-status" id="loaderStatus">Starting download...</div>
    <div class="progress-container"><div id="progressBar"></div></div>
    <div class="loader-eta" id="loaderEta">ESTIMATED TIME: --s</div>
  </div>
</div>

<div id="commandPalette">
  <input type="text" id="commandInput" placeholder="Type a command (e.g., 'save', 'run', 'theme')...">
  <div id="commandList"></div>
</div>

<header>
  <div class="header-left">
    <button id="settingsBtn" onclick="openModal('settingsModal')">⚙️ Settings</button>
    <button id="assetsBtn" onclick="openModal('assetsModal')">🖼️ Assets</button>
    <button id="loadBtn" onclick="openLoadModal()">📂 Load</button>
    <button id="saveBtn" onclick="saveProject()">💾 Save</button>
    <button id="profileBtn" onclick="openProfileModal()">👤 Profile</button>
  </div>
  <div class="diamond-logo-container" onclick="toggleCommandPalette()">
    <img id="headerLogo" src="">
  </div>
  <div class="header-right">
    <input id="projectName" type="text" value="my_project"/>
    <button id="runBtn" onclick="handleRunClick()">▶ RUN</button>
    <button id="logoutBtn" onclick="logout()">↩ EXIT</button>
  </div>
</header>

<main>
  <div id="consoleBg"></div>
  <div class="editor-panel">
    <div class="panel-label">editor — python</div>
    <div id="editor"></div>
  </div>
  <div class="output-panel">
    <div class="output-header">
      <span class="panel-label" style="padding:0;border:none;">console</span>
      <button id="clearBtn">✕ clear</button>
    </div>
    <div id="output-container">
      <div id="output"></div>
      <div id="console-input-line">
        <span id="console-prompt">>>></span>
        <input type="text" id="console-input" placeholder="Type Python here..." autocomplete="off">
      </div>
    </div>
  </div>
  <div class="boss-sidebar">
    <div class="boss-header">
      <div class="boss-avatar" id="bossAvatar">🕶️</div>
      <div class="boss-name">Boss AI</div>
    </div>
    <div class="boss-chat" id="bossChat"></div>
    <div class="typing-indicator" id="typingIndicator" style="display:none;">Boss is watching you type...</div>
  </div>
</main>

<div id="statusBar">
  <span id="statusText">⚡ Engine standby. Click Run to initialize.</span>
  <span id="pyVersion"></span>
</div>

<div id="toast"></div>

<!-- Modals -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3>⚙️ Global Settings</h3>
    <div class="input-group">
      <label class="input-label">Site Name (HTML allowed)</label>
      <input class="modal-input" id="setSiteName" placeholder="Py<span>Cloud</span>">
    </div>
    <button class="save-settings-btn" onclick="saveGlobalSettings()">Update Globally</button>
    <button class="modal-close" onclick="closeModal('settingsModal')">Cancel</button>
  </div>
</div>

<div class="modal-bg" id="assetsModal">
  <div class="modal">
    <h3>🖼️ Asset Manager</h3>
    <div style="display:grid; gap:10px;">
      <button onclick="pickAndUpload('logoUrl')">Upload Logo</button>
      <button onclick="pickAndUpload('backgroundUrl')">Upload Background</button>
      <button onclick="pickAndUpload('aiSymbolUrl')">Upload AI Symbol</button>
      <button onclick="pickAndUpload('saveIconUrl')">Upload Save Icon</button>
      <button onclick="pickAndUpload('consoleBgUrl')">Upload Console BG</button>
    </div>
    <div id="uploadProgress" style="display:none; margin-top:10px;">
      <div id="uploadStatus" style="font-size:10px; color:var(--muted);">Compressing...</div>
      <div style="height:4px; background:var(--border); border-radius:2px; margin-top:4px; overflow:hidden;">
        <div id="uploadBar" style="height:100%; width:0%; background:var(--accent);"></div>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal('assetsModal')">Close</button>
  </div>
</div>

<div class="modal-bg" id="profileModal">
  <div class="modal">
    <h3>👤 Your Progress</h3>
    <div id="profileRankBadge" class="rank-badge-big"></div>
    <div id="profileScore" style="text-align:center; font-weight:800; font-size:24px; color:var(--accent);"></div>
    <div class="rank-bar-wrap">
      <div class="rank-bar-track"><div id="profileRankBar" class="rank-bar-fill"></div></div>
      <div id="profileRankLabel" class="rank-bar-label"></div>
    </div>
    <div id="profileStats" class="stat-grid"></div>
    <h4>Achievements</h4>
    <div id="profileAchievements" class="ach-list"></div>
    <details style="margin-top:16px;">
      <summary style="font-size:10px; color:var(--muted); cursor:pointer;">ADMIN OVERRIDE</summary>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
        <input class="modal-input" id="admin_lettersTyped" placeholder="Keys">
        <input class="modal-input" id="admin_backspaces" placeholder="Back">
        <input class="modal-input" id="admin_runsSuccessful" placeholder="Runs">
        <input class="modal-input" id="admin_linesTyped" placeholder="Lines">
        <input class="modal-input" id="admin_functionsRun" placeholder="Funcs">
        <select class="modal-input" id="admin_rankOverride">
          <option value="">No Override</option>
          <option value="Beginner Coder">Beginner</option>
          <option value="Intermediate Coder">Intermediate</option>
          <option value="Epic Coder">Epic</option>
          <option value="Legendary Coder">Legendary</option>
          <option value="Mythic Coder">Mythic</option>
        </select>
      </div>
      <button onclick="window._saveAdminStats()" style="width:100%; margin-top:8px; background:var(--red); color:#fff;">Apply Override</button>
    </details>
    <button class="modal-close" onclick="closeModal('profileModal')">Close</button>
  </div>
</div>

<div class="modal-bg" id="loadModal">
  <div class="modal">
    <h3>📂 Load Project</h3>
    <div id="projectList" style="max-height:300px; overflow-y:auto;"></div>
    <button class="modal-close" onclick="closeModal('loadModal')">Close</button>
  </div>
</div>

<script type="module">

    projectId: "ideqvr",

  const app = initializeApp(firebaseConfig);

      if (window._renderProfile) window._renderProfile();
      if (window._checkAchievements) window._checkAchievements();
    }
  });

  window._flushStats = async function() {
    const delta = window._statsDelta;
    if (!delta) return;
    const total = (delta.lettersTyped||0)+(delta.backspaces||0)+(delta.runsSuccessful||0)+(delta.linesTyped||0)+(delta.functionsRun||0);
    if (total === 0) return;
    window._statsDelta = { lettersTyped:0, backspaces:0, runsSuccessful:0, linesTyped:0, functionsRun:0 };
    try {
      await setDoc(doc(db, 'stats', 'global'), {
        lettersTyped:   increment(delta.lettersTyped   || 0),
        backspaces:     increment(delta.backspaces     || 0),
        runsSuccessful: increment(delta.runsSuccessful || 0),
        linesTyped:     increment(delta.linesTyped     || 0),
        functionsRun:   increment(delta.functionsRun   || 0),
      }, { merge: true });
    } catch(e) { console.warn('Stats flush failed', e); }
  };
  setInterval(() => window._flushStats && window._flushStats(), 60000);
  window.addEventListener('beforeunload', () => window._flushStats && window._flushStats());

  window._saveAdminStats = async function() {
    const fields = ['lettersTyped','backspaces','runsSuccessful','linesTyped','functionsRun'];
    const updates = {};
    for (const f of fields) {
      const el = document.getElementById('admin_' + f);
      if (el && el.value.trim() !== '') updates[f] = Math.max(0, parseInt(el.value)||0);
    }
    const ro = document.getElementById('admin_rankOverride')?.value || '';
    updates.adminOverride = { rank: ro };
    try {
      await setDoc(doc(db, 'stats', 'global'), updates, { merge: true });
      showToast('✅ Stats overridden globally!');
    } catch(e) { showToast('❌ Failed: ' + e.message); }
  };

  window._compressAndUpload = async function(file, assetKey) {
    const base64 = await new Promise((resolve, reject) => {
      const img = new Image();
      const blobUrl = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX/w, MAX/h);
          w = Math.round(w*ratio); h = Math.round(h*ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(blobUrl);
        let q = 0.70;
        let out = canvas.toDataURL('image/jpeg', q);
        while (out.length > 200000 && q > 0.25) { q -= 0.1; out = canvas.toDataURL('image/jpeg', q); }
        resolve(out);
      };
      img.src = blobUrl;
    });
    await setDoc(doc(db, 'settings', 'global'), { assets: { [assetKey]: base64 } }, { merge: true });
    return base64;
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>
let editor, pyodide, pyodideReady = false, isDownloading = false;
const output = document.getElementById('output');
const bossChat = document.getElementById('bossChat');
const typingIndicator = document.getElementById('typingIndicator');
const consoleInput = document.getElementById('console-input');
window._statsDelta = { lettersTyped:0, backspaces:0, runsSuccessful:0, linesTyped:0, functionsRun:0 };

// ── MONACO ──
require.config({ paths:{ vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
require(['vs/editor/editor.main'], function(){
  editor = monaco.editor.create(document.getElementById('editor'),{
    value: "# Welcome Boss\nprint('Ready to cook?')",
    language:'python', theme: 'vs-dark',
    fontSize:14, fontFamily:"'Space Mono',monospace",
    automaticLayout:true
  });
  editor.onDidChangeModelContent((e) => {
    trackKeystroke();
    const lastChange = e.changes[0].text;
    for (const [kw, msg] of Object.entries(KEYWORD_REACTIONS)) {
      if (lastChange.includes(kw)) { addBossMsg(msg); break; }
    }
  });
  editor.onKeyDown((e) => {
    const k = e.browserEvent.key;
    if (k === 'Backspace' || k === 'Delete') window._statsDelta.backspaces++;
    else if (k === 'Enter') { window._statsDelta.lettersTyped++; window._statsDelta.linesTyped++; }
    else if (k.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) window._statsDelta.lettersTyped++;
  });
});

// ── INTERACTIVE CONSOLE (REPL) ──
consoleInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const code = consoleInput.value.trim();
    if (!code) return;
    if (!pyodideReady) {
      addOutput(`\n[ERROR] Python engine not ready. Click RUN to initialize.`, 'error');
      consoleInput.value = '';
      return;
    }
    addOutput(`\n>>> ${code}`, 'info');
    consoleInput.value = '';
    try {
      const result = await pyodide.runPythonAsync(code);
      if (result !== undefined) addOutput(String(result));
      window._statsDelta.runsSuccessful++;
    } catch (err) {
      addOutput(err.message, 'error');
    }
  }
});

function addOutput(text, type = '') {
  const span = document.createElement('span');
  if (type) span.className = type;
  span.textContent = text + '\n';
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

// ── BOSS AI LOGIC ──
function addBossMsg(text) {
  const msg = document.createElement('div');
  msg.className = 'msg boss';
  msg.textContent = text;
  bossChat.appendChild(msg);
  bossChat.scrollTop = bossChat.scrollHeight;
}

let typingTimeout;
function trackKeystroke() {
  typingIndicator.style.display = 'block';
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    typingIndicator.style.display = 'none';
    if (Math.random() > 0.99) addBossMsg(BOSS_MESSAGES[Math.floor(Math.random() * BOSS_MESSAGES.length)]);
  }, 1500);
}

window._checkAchievements = function() {
  const stats = window._statsData || {};
  ACHIEVEMENTS_DATA.forEach(ach => {
    if (stats[ach.stat] >= ach.need && !localStorage.getItem('ach_' + ach.id)) {
      localStorage.setItem('ach_' + ach.id, 'true');
      addBossMsg(`🏆 ACHIEVEMENT UNLOCKED: ${ach.name}! ${ach.desc}`);
      showToast(`🏆 ${ach.name} Unlocked!`);
    }
  });
};

// ── PROFILE LOGIC ──
const RANKS = [
  { name:'Beginner Coder', icon:'🌱', min:0, color:'#4a5568' },
  { name:'Intermediate Coder', icon:'⚡', min:1000, color:'#00e5ff' },
  { name:'Epic Coder', icon:'🔥', min:5000, color:'#00ff9d' },
  { name:'Legendary Coder', icon:'👑', min:20000, color:'#f59e0b' },
  { name:'Mythic Coder', icon:'🌌', min:75000, color:'#b47aff' },
];

function calcScore(s) {
  return Math.floor((s.lettersTyped||0)*0.5 + (s.runsSuccessful||0)*50 + (s.linesTyped||0)*3 + (s.functionsRun||0)*30);
}

window._renderProfile = function() {
  const s = window._statsData || {};
  const score = calcScore(s);
  let rank = RANKS[0];
  let next = null;
  for (const r of RANKS) { if (score >= r.min) rank = r; else { next = r; break; } }
  const rankPct = next ? Math.min(100, ((score - rank.min) / (next.min - rank.min)) * 100) : 100;

  document.getElementById('profileRankBadge').innerHTML = `<span class="rank-icon-big">${rank.icon}</span><span class="rank-name-big" style="color:${rank.color}">${rank.name}</span>`;
  document.getElementById('profileScore').textContent = score.toLocaleString() + ' XP';
  document.getElementById('profileRankBar').style.cssText = `width:${rankPct}%;background:${rank.color};`;
  document.getElementById('profileRankLabel').textContent = next ? `${Math.round(rankPct)}% to ${next.icon} ${next.name}` : '🏆 MAX RANK ACHIEVED';

  const statsRows = [
    { v:(s.lettersTyped||0).toLocaleString(), l:'Keys' },
    { v:(s.backspaces||0).toLocaleString(), l:'Back' },
    { v:(s.runsSuccessful||0).toLocaleString(), l:'Runs' },
    { v:(s.linesTyped||0).toLocaleString(), l:'Lines' },
    { v:(s.functionsRun||0).toLocaleString(), l:'Funcs' },
    { v:score.toLocaleString(), l:'Total XP' },
  ];
  document.getElementById('profileStats').innerHTML = statsRows.map(r => `<div class="stat-card"><div class="stat-value">${r.v}</div><div class="stat-label">${r.l}</div></div>`).join('');

  document.getElementById('profileAchievements').innerHTML = ACHIEVEMENTS_DATA.map(a => {
    const val = s[a.stat] || 0;
    const pct = Math.min(100, (val / a.need) * 100);
    const unlocked = val >= a.need;
    return `<div class="ach-item ${unlocked?'ach-unlocked':'ach-locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-meta">
        <div class="ach-name" style="color:${unlocked?'var(--green)':'var(--text)'}">${a.name}${unlocked?' ✅':''}</div>
        <div class="ach-desc">${a.desc}</div>
        <div class="ach-bar"><div class="ach-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
};

// ── PYODIDE LOADER (WASM INTERCEPT) ──
async function loadPyodideWithProgress() {
  if (isDownloading) return;
  isDownloading = true;
  const overlay = document.getElementById('loaderOverlay');
  const bar = document.getElementById('progressBar');
  const status = document.getElementById('loaderStatus');
  const eta = document.getElementById('loaderEta');
  overlay.style.display = 'flex';

  const originalFetch = window.fetch;
  window.fetch = async function(input, init) {
    const url = (typeof input === 'string') ? input : (input?.url ?? '');
    const response = await originalFetch(input, init);
    if (url.includes('pyodide.asm.wasm')) {
      const total = parseInt(response.headers.get('content-length') || '28500000');
      let received = 0;
      const t0 = Date.now();
      const reader = response.body.getReader();
      return new Response(new ReadableStream({
        start(controller) {
          function pump() {
            return reader.read().then(({ done, value }) => {
              if (done) { controller.close(); return; }
              received += value.length;
              const pct = Math.min(95, (received / total) * 100);
              bar.style.width = pct + '%';
              const elapsed = (Date.now() - t0) / 1000;
              const speed = received / Math.max(elapsed, 0.1);
              const etaSec = Math.ceil((total - received) / speed);
              eta.textContent = `ESTIMATED TIME: ${etaSec}s`;
              controller.enqueue(value);
              return pump();
            });
          }
          return pump();
        }
      }), { headers: response.headers });
    }
    return response;
  };

  const script = document.createElement('script');
  script.src = "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js";
  document.head.appendChild(script);
  script.onload = async () => {
    pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" });
    pyodideReady = true;
    window.fetch = originalFetch;
    bar.style.width = '100%';
    setTimeout(() => overlay.style.display = 'none', 500);
    runCode();
  };
}

function handleRunClick() {
  if (!pyodideReady) {
    if (confirm("Python runtime not installed. Download required. Continue?")) loadPyodideWithProgress();
  } else runCode();
}

async function runCode() {
  const code = editor.getValue();
  output.innerHTML = '<span style="color:var(--muted)">Running...</span>\n';
  try {
    await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()\nsys.stderr = io.StringIO()`);
    await pyodide.runPythonAsync(code);
    const res = await pyodide.runPythonAsync("sys.stdout.getvalue()");
    const err = await pyodide.runPythonAsync("sys.stderr.getvalue()");
    output.textContent = res + (err ? '\n' + err : '');
    if (!res && !err) output.textContent = '(no output)';
    window._statsDelta.runsSuccessful++;
    const funcMatches = (code.match(/^\s*def\s+\w+/gm) || []).length;
    window._statsDelta.functionsRun += funcMatches;
    addBossMsg("Execution successful, Boss.");
  } catch(e) {
    output.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
  }
}

// ── PROJECT SAVE/LOAD ──
async function saveProject() {
  const name = document.getElementById('projectName').value.trim() || 'untitled';
  const code = editor.getValue();
  try {
    await window._firestoreFns.setDoc(window._firestoreFns.doc(window._db, 'projects', name), { name, code, updatedAt: new Date().toISOString() });
    showToast(`🛡️ Saved: ${name}`);
  } catch(e) { showToast('❌ Save failed'); }
}

async function openLoadModal() {
  const list = document.getElementById('projectList');
  list.innerHTML = 'Loading...';
  openModal('loadModal');
  const snap = await window._firestoreFns.getDocs(window._firestoreFns.collection(window._db, 'projects'));
  list.innerHTML = '';
  snap.forEach(docSnap => {
    const d = docSnap.data();
    const div = document.createElement('div');
    div.style.cssText = "padding:10px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between;";
    div.innerHTML = `<span>${d.name}</span><button style="background:var(--red); color:#fff; padding:2px 6px;">del</button>`;
    div.onclick = () => { editor.setValue(d.code); document.getElementById('projectName').value = d.name; closeModal('loadModal'); };
    div.querySelector('button').onclick = (e) => { e.stopPropagation(); window._firestoreFns.deleteDoc(window._firestoreFns.doc(window._db, 'projects', d.name)); div.remove(); };
    list.appendChild(div);
  });
}

// ── ASSET UPLOAD ──
function pickAndUpload(assetKey) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const pw = document.getElementById('uploadProgress');
    const bar = document.getElementById('uploadBar');
    pw.style.display = 'block'; bar.style.width = '50%';
    try {
      await window._compressAndUpload(file, assetKey);
      bar.style.width = '100%';
      setTimeout(() => pw.style.display = 'none', 2000);
      showToast('✅ Asset synced globally!');
    } catch(err) { showToast('❌ Upload failed'); pw.style.display = 'none'; }
  };
  input.click();
}

async function saveGlobalSettings() {
  const name = document.getElementById('setSiteName').value;
  await window._firestoreFns.setDoc(window._firestoreFns.doc(window._db, "settings", "global"), { siteName: name }, { merge: true });
  showToast("🛡️ Settings updated!");
}

// ── COMMAND PALETTE LOGIC ──
const COMMANDS = [
  { name: 'Save Project', cmd: saveProject, shortcut: 'Ctrl+S' },
  { name: 'Run Code', cmd: handleRunClick, shortcut: 'Ctrl+Enter' },
  { name: 'Toggle Theme', cmd: () => document.getElementById('themeToggle').click(), shortcut: 'Alt+T' },
  { name: 'Open Settings', cmd: () => openModal('settingsModal'), shortcut: 'Alt+S' },
  { name: 'Open Profile', cmd: () => openProfileModal(), shortcut: 'Alt+P' },
  { name: 'Clear Console', cmd: () => document.getElementById('clearBtn').click(), shortcut: 'Alt+C' }
];

function toggleCommandPalette() {
  const p = document.getElementById('commandPalette');
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
  if (p.style.display === 'flex') document.getElementById('commandInput').focus();
}

document.getElementById('commandInput').oninput = (e) => {
  const val = e.target.value.toLowerCase();
  const list = document.getElementById('commandList');
  list.innerHTML = COMMANDS.filter(c => c.name.toLowerCase().includes(val)).map(c => `
    <div class="command-item" onclick="executeCommand('${c.name}')">
      <span>${c.name}</span>
      <span class="command-shortcut">${c.shortcut}</span>
    </div>
  `).join('');
};

function executeCommand(name) {
  const c = COMMANDS.find(c => c.name === name);
  if (c) { c.cmd(); toggleCommandPalette(); }
}

window.onkeydown = (e) => {
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); toggleCommandPalette(); }
  if (e.key === 'Escape') document.getElementById('commandPalette').style.display = 'none';
};
function openProfileModal() {
  window._renderProfile();
  openModal('profileModal');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { window.location.href = 'index.html'; }
window.onload = () => {
  if (sessionStorage.getItem('just_logged_in')) {
    setTimeout(() => { addBossMsg("Hey Boss, are you ready to cook? Select what image you like from the ones I sent."); sessionStorage.removeItem('just_logged_in'); }, 1000);
  } else { addBossMsg("Welcome back, Boss."); }
};
