<!-- ── 1. PYODIDE LOADER UI ───────────────────────────────── -->
<style>
  /* Loader overlay — shown only when Pyodide is downloading */
  #pyLoader {
    display: none;            /* hidden until needed */
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(8,10,13,0.85);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-family: 'Space Mono', monospace;
    color: #fff;
  }
  #pyLoader.visible { display: flex; }

  #pyLoader .loader-title {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  #pyLoader .loader-status {
    font-size: 12px;
    color: #00e5ff;
    min-height: 16px;
    letter-spacing: 1px;
  }
  #pyLoader .progress-track {
    width: 280px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #pyLoader .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00e5ff, #7c3aed);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  #pyLoader .loader-eta {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
</style>

<div id="pyLoader">
  <div class="loader-title">Python Runtime</div>
  <div class="loader-status" id="pyStatus">Starting download...</div>
  <div class="progress-track">
    <div class="progress-fill" id="pyProgress"></div>
  </div>
  <div class="loader-eta" id="pyETA"></div>
</div>


<!-- ── 2. MODULE SCRIPT ───────────────────────────────────── -->
<script type="module">
  import { handleRunClick, initAssetSync, isPyodideReady }
    from "./pycloud-modules.js";

  // ── Asset sync (same as login page) ──────────────────────
  initAssetSync({
    onBackground(url) { document.body.style.backgroundImage = `url('${url}')`; },
    onLogo(url)       { /* update your logo img src */ },
    onSiteName(name)  { /* update your brand display */ },
  });

  // ── Loader UI helpers ─────────────────────────────────────
  const loader   = document.getElementById("pyLoader");
  const statusEl = document.getElementById("pyStatus");
  const barEl    = document.getElementById("pyProgress");
  const etaEl    = document.getElementById("pyETA");

  function showLoader()  { loader.classList.add("visible"); }
  function hideLoader()  { loader.classList.remove("visible"); }

  const loaderCallbacks = {
    onStatus(msg)  { statusEl.textContent = msg; },
    onProgress(pct){ barEl.style.width = pct + "%"; },
    onETA(secs)    {
      etaEl.textContent = secs > 0
        ? `~${secs}s remaining`
        : "Almost done...";
    },
    onReady()  { setTimeout(hideLoader, 600); },
    onError(e) {
      statusEl.textContent = "Error: " + e;
      statusEl.style.color = "#ff4f6a";
    },
  };

  // ── Run button handler — expose globally ──────────────────
  window.pyRun = function(code) {
    if (!isPyodideReady()) showLoader();

    handleRunClick(
      code,
      loaderCallbacks,
      {
        onOutput(stdout, stderr) {
          // Replace with your actual output display logic
          console.log("[stdout]", stdout);
          if (stderr) console.warn("[stderr]", stderr);
        },
        onError(msg) {
          console.error("[error]", msg);
        },
      }
    );
  };

  // Wire to your existing Run button — example:
  // document.getElementById("runBtn").addEventListener("click", () => {
  //   const code = editor.getValue(); // CodeMirror / Monaco / textarea
  //   window.pyRun(code);
  // });
</script>


<!-- ── 3. ASSET UPLOAD (optional admin panel) ─────────────── -->
<script type="module">
  import { pickAndUploadAsset } from "./pycloud-modules.js";

  /**
   * Call from any button in your admin/settings panel.
   * e.g.  <button onclick="changeBackground()">Change Background</button>
   */
  window.changeBackground = async function() {
    await pickAndUploadAsset(
      "backgroundUrl",
      "image/*",
      (pct) => console.log(`Upload: ${pct}%`)
    );
    // onSnapshot in initAssetSync fires automatically on all devices
  };

  window.changeLogo = async function() {
    await pickAndUploadAsset("logoUrl");
  };

  window.changeSettingsIcon = async function() {
    await pickAndUploadAsset("settingsIconUrl");
  };
</script>
