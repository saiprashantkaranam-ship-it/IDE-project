<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyCloud — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #080a0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }
    canvas { position: fixed; inset: 0; z-index: 0; }
    .card {
      position: relative;
      z-index: 10;
      background: rgba(10,12,18,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 18px;
      padding: 48px 44px 40px;
      width: 380px;
      max-width: 92vw;
      box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(30px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .brand { font-size:26px; font-weight:800; letter-spacing:-1px; color:#fff; margin-bottom:4px; }
    .brand span { color:#00e5ff; }
    .subtitle {
      font-family:'Space Mono',monospace; font-size:11px;
      color:rgba(255,255,255,0.3); letter-spacing:2px;
      text-transform:uppercase; margin-bottom:36px;
    }
    label {
      display:block; font-family:'Space Mono',monospace; font-size:10px;
      letter-spacing:2px; color:rgba(255,255,255,0.4);
      text-transform:uppercase; margin-bottom:10px;
    }
    .input-wrap { position:relative; margin-bottom:24px; }
    input[type="password"], input[type="text"] {
      width:100%; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      color:#fff; font-family:'Space Mono',monospace;
      font-size:18px; letter-spacing:6px;
      padding:14px 48px 14px 18px; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { letter-spacing:2px; font-size:12px; color:rgba(255,255,255,0.18); }
    input:focus { border-color:rgba(0,229,255,0.5); box-shadow:0 0 0 3px rgba(0,229,255,0.08); }
    input.error {
      border-color:rgba(255,79,106,0.6)!important;
      box-shadow:0 0 0 3px rgba(255,79,106,0.08)!important;
      animation:shake 0.35s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)}
    }
    .eye {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer;
      color:rgba(255,255,255,0.3); font-size:16px; padding:4px; transition:color 0.2s;
    }
    .eye:hover { color:rgba(255,255,255,0.7); }
    .error-msg {
      font-family:'Space Mono',monospace; font-size:11px;
      color:#ff4f6a; margin-top:-16px; margin-bottom:20px; min-height:16px;
    }
    .login-btn {
      width:100%; padding:15px;
      background:linear-gradient(135deg,#00e5ff 0%,#7c3aed 100%);
      border:none; border-radius:10px; color:#fff;
      font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .login-btn:hover { filter:brightness(1.1); }
    .login-btn:active { transform:scale(0.98); }
    .footer-note {
      margin-top:24px; font-family:'Space Mono',monospace;
      font-size:10px; color:rgba(255,255,255,0.15); text-align:center; letter-spacing:1px;
    }
    .success-overlay {
      position:fixed; inset:0; z-index:999; background:rgba(0,229,255,0.06);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .success-overlay.show { opacity:1; pointer-events:all; }
    .success-icon { font-size:64px; animation:popIn 0.4s cubic-bezier(0.22,1,0.36,1); }
    @keyframes popIn {
      from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1}
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="card">
  <div class="brand">Py<span>Cloud</span></div>
  <div class="subtitle">Personal IDE — Restricted Access</div>
  <label for="pwd">Password</label>
  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="enter password" autocomplete="off" autofocus/>
    <button class="eye" onclick="toggleEye()" tabindex="-1">👁</button>
  </div>
  <div class="error-msg" id="errMsg"></div>
  <button class="login-btn" onclick="doLogin()">Enter IDE →</button>
  <div class="footer-note">PyCloud · private workspace</div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
</div>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);
const lines=[
  {x1f:0.0,y1f:0.72,x2f:0.55,y2f:0.58,bright:1.0,width:1.2},
  {x1f:0.0,y1f:0.76,x2f:0.55,y2f:0.62,bright:0.55,width:0.6},
  {x1f:0.0,y1f:0.68,x2f:0.40,y2f:0.56,bright:0.30,width:0.4},
  {x1f:0.55,y1f:0.58,x2f:1.0,y2f:0.78,bright:0.85,width:1.0},
  {x1f:0.55,y1f:0.62,x2f:1.0,y2f:0.82,bright:0.40,width:0.5},
  {x1f:0.30,y1f:1.0,x2f:0.55,y2f:0.58,bright:0.25,width:0.4},
];
function drawBloom(){
  const cx=canvas.width*0.55,cy=canvas.height*0.58;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,canvas.width*0.28);
  g.addColorStop(0,'rgba(200,210,220,0.045)');
  g.addColorStop(0.4,'rgba(180,190,200,0.018)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
}
let tick=0;
function draw(){
  tick+=0.008; ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#080a0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawBloom();
  lines.forEach((l,i)=>{
    const x1=l.x1f*canvas.width,y1=l.y1f*canvas.height;
    const x2=l.x2f*canvas.width,y2=l.y2f*canvas.height;
    const pulse=0.85+0.15*Math.sin(tick*1.4+i*1.1);
    const alpha=l.bright*pulse;
    [{blur:18,a:alpha*0.12,w:l.width*10},{blur:8,a:alpha*0.28,w:l.width*4},{blur:0,a:alpha*0.95,w:l.width}]
    .forEach(p=>{
      ctx.save(); ctx.shadowBlur=p.blur; ctx.shadowColor=`rgba(220,230,240,${p.a})`;
      ctx.strokeStyle=`rgba(220,230,240,${p.a})`; ctx.lineWidth=p.w; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
    });
  });
  requestAnimationFrame(draw);
}
draw();

function getPassword(){ return localStorage.getItem('pycloud_password')||'MOON'; }

function doLogin(){
  const val=document.getElementById('pwd').value;
  const inp=document.getElementById('pwd');
  const err=document.getElementById('errMsg');
  if(val===getPassword()){
    err.textContent=''; inp.classList.remove('error');
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(()=>{ window.location.href='ide.html'; },900);
  } else {
    inp.classList.add('error');
    err.textContent='Incorrect password. Try again.';
    inp.value='';
    setTimeout(()=>inp.classList.remove('error'),600);
  }
}
document.getElementById('pwd').addEventListener('keydown',e=>{
  if(e.key==='Enter') doLogin();
  document.getElementById('errMsg').textContent='';
});
function toggleEye(){
  const inp=document.getElementById('pwd');
  inp.type=inp.type==='password'?'text':'password';
}
</script>
</body>
</html>
