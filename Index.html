<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash of Gods</title>

<style>

/* ================= GLOBAL ================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: url("assets/background.jpg") no-repeat center center/cover;
    overflow: hidden;
    color: white;
    animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    z-index: 0;
}

/* ================= TOP BAR ================= */

.top-bar {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.8);
    border-bottom: 2px solid gold;
}

.player-name {
    font-size: 22px;
    font-weight: bold;
    color: gold;
    text-shadow: 0 0 10px gold;
    margin-right: 20px;
}

/* Coins & Gems */
.currency-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 15px;
    font-weight: bold;
    color: gold;
    font-size: 16px;
}

.currency-container img {
    width: 24px;
    height: 24px;
}

/* Top icons */
.top-icons img {
    width: 35px;
    margin-left: 15px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.top-icons img:active {
    transform: scale(0.85);
}

/* ================= MAIN AREA ================= */

.main-container {
    position: relative;
    z-index: 2;
    height: calc(100vh - 140px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Title Glow */
.game-title {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 40px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px gold; }
    to { text-shadow: 0 0 35px orange; }
}

/* Battle Image Energy Pulse */
.battle-image {
    width: 220px;
    margin-bottom: 30px;
    cursor: pointer;
    animation: pulse 2s infinite;
    transition: transform 0.15s ease;
}

@keyframes pulse {
    0% { filter: drop-shadow(0 0 5px gold); }
    50% { filter: drop-shadow(0 0 25px orange); }
    100% { filter: drop-shadow(0 0 5px gold); }
}

.battle-image:active {
    transform: scale(0.9);
}

/* ================= BUTTONS ================= */

.game-button {
    width: 250px;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
}

.quick-match {
    background: linear-gradient(45deg, crimson, red);
    color: white;
}

.bot-match {
    background: linear-gradient(45deg, darkblue, blue);
    color: white;
}

.game-button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px gold;
}

.game-button:active {
    transform: scale(0.92);
    box-shadow: 0 0 35px gold;
}

/* ================= BOTTOM NAV ================= */

.bottom-bar {
    position: relative;
    z-index: 2;
    height: 70px;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 2px solid gold;
}

.nav-item {
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.nav-item img {
    width: 40px;
}

.nav-item p {
    font-size: 12px;
    margin-top: 5px;
}

.nav-item:active {
    transform: scale(0.85);
}

/* ================= SCREEN SHAKE ================= */

@keyframes shake {
    0% { transform: translate(0); }
    20% { transform: translate(-5px, 5px); }
    40% { transform: translate(-5px, -5px); }
    60% { transform: translate(5px, 5px); }
    80% { transform: translate(5px, -5px); }
    100% { transform: translate(0); }
}

.shake {
    animation: shake 0.4s;
}

/* ================= DECK SCREEN ================= */

.deck-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(10,10,20,0.95);
    z-index: 5;
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
    animation: fadeIn 0.4s ease;
}

.deck-title {
    font-size: 36px;
    font-weight: bold;
    color: gold;
    margin-bottom: 30px;
    text-shadow: 0 0 15px gold;
}

.deck-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
    padding: 0 20px;
}

.card-slot {
    width: 90px;
    height: 140px;
    border-radius: 15px;
    border: 2px solid gold;
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 13px;
    text-align: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
}

.card-slot:active {
    transform: scale(0.9);
    box-shadow: 0 0 20px orange;
}

.guild-placeholder {
    font-size: 18px;
    color: white;
    margin-bottom: 20px;
}

.back-btn {
    padding: 10px 25px;
    background: crimson;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.back-btn:active {
    transform: scale(0.9);
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div style="display: flex; align-items: center;">
        <div class="player-name">Player_001</div>
        <!-- Coins & Gems -->
        <div class="currency-container">
            <img src="assets/coin.png" alt="Coins">
            <span id="coinCount">100</span>
            <img src="assets/gem.png" alt="Gems">
            <span id="gemCount">50</span>
        </div>
    </div>
    <div class="top-icons">
        <img src="assets/friends.png" alt="Friends">
        <img src="assets/settings.png" alt="Settings">
    </div>
</div>

<!-- MAIN CENTER -->
<div class="main-container">
    <div class="game-title">CLASH OF GODS</div>

    <img src="assets/battle.png" class="battle-image" onclick="battleSound()" alt="Battle">

    <button class="game-button quick-match" onclick="battleSound()">Start Quick Match</button>
    <button class="game-button bot-match" onclick="battleSound()">Play vs Bot</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-bar">
    <div class="nav-item">
        <img src="assets/market.png">
        <p>Market</p>
    </div>
    <div class="nav-item" onclick="openDeck()">
        <img src="assets/deck.png">
        <p>My Deck</p>
    </div>
    <div class="nav-item">
        <img src="assets/guild.png">
        <p>Guild</p>
    </div>
    <div class="nav-item">
        <img src="assets/chat.png">
        <p>Chat</p>
    </div>
</div>

<!-- ================= DECK SCREEN ================= -->
<div class="deck-screen" id="deckScreen">

    <div class="deck-title">MY DECK</div>

    <div class="deck-container">
        <div class="card-slot">card1.png</div>
        <div class="card-slot">card2.png</div>
        <div class="card-slot">card3.png</div>
        <div class="card-slot">card4.png</div>
        <div class="card-slot">card5.png</div>
        <div class="card-slot">card6.png</div>
        <div class="card-slot">card7.png</div>
        <div class="card-slot">card8.png</div>
    </div>

    <div class="guild-placeholder">guild.png</div>

    <button class="back-btn" onclick="closeDeck()">Back</button>

</div>

<!-- SOUND -->
<audio id="battle-audio" src="assets/battle.mp3"></audio>

<script>
function battleSound() {
    const audio = document.getElementById("battle-audio");
    audio.currentTime = 0;
    audio.play();

    document.body.classList.add("shake");
    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 400);
}

// ================= DECK FUNCTIONS =================
function openDeck() {
    document.getElementById("deckScreen").style.display = "flex";
}

function closeDeck() {
    document.getElementById("deckScreen").style.display = "none";
}

// ================= UPDATE COINS/GEMS =================
function addCoins(amount) {
    const coinEl = document.getElementById("coinCount");
    coinEl.textContent = parseInt(coinEl.textContent) + amount;
}

function addGems(amount) {
    const gemEl = document.getElementById("gemCount");
    gemEl.textContent = parseInt(gemEl.textContent) + amount;
}
</script>

</body>
</html>
